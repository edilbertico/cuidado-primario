<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Dashboard Ejecutivo APS Consolidado — Cundinamarca</title>
<style>
:root{
  --bg:#062F5F;--bg2:#0B4F9E;--accent:#FCE803;--red:#C8102E;--green:#0A8A3F;
  --light:#f0f4f8;--gray:#64748b;--dark:#1e293b;--white:#fff;
  --radius:12px;--shadow:0 4px 24px rgba(6,47,95,.12)
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--light);color:var(--dark);line-height:1.6}
.app-header{background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--white);padding:.75rem 1.5rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.app-logo{display:flex;align-items:center;gap:.6rem}
.app-logo-icon{width:42px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--bg)}
.app-logo h1{font-size:1.05rem;font-weight:700}
.app-logo p{font-size:.7rem;opacity:.85}
.header-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{background:var(--bg2);color:var(--white);border:none;padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:.4rem}
.btn:hover{background:var(--bg);transform:translateY(-1px)}
.btn.accent{background:var(--accent);color:var(--bg)}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.btn.outline{background:transparent;border:2px solid rgba(255,255,255,.3);color:var(--white)}
.btn.outline:hover{background:rgba(255,255,255,.1)}
.filter-bar{background:var(--white);border-bottom:2px solid #e2e8f0;padding:1rem 1.5rem;position:sticky;top:62px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.filter-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem;align-items:end}
.filter-group{display:flex;flex-direction:column;gap:.25rem}
.filter-group label{font-size:.72rem;font-weight:700;color:var(--bg);text-transform:uppercase;letter-spacing:.04em}
.filter-group select{padding:.5rem .7rem;border:2px solid #e2e8f0;border-radius:8px;font-size:.85rem;font-family:inherit;background:var(--white);cursor:pointer;transition:.2s}
.filter-group select:focus{outline:none;border-color:var(--bg2);box-shadow:0 0 0 3px rgba(11,79,158,.1)}
.app-container{max-width:1400px;margin:0 auto;padding:1.5rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;text-align:center;border-top:4px solid var(--bg2);transition:transform .2s}
.kpi-card:hover{transform:translateY(-3px)}
.kpi-card .kpi-icon{font-size:1.8rem;margin-bottom:.3rem}
.kpi-card .kpi-value{font-size:2rem;font-weight:800;color:var(--bg);line-height:1.1}
.kpi-card .kpi-label{font-size:.78rem;color:var(--gray);font-weight:600;margin-top:.2rem;text-transform:uppercase;letter-spacing:.03em}
.kpi-card .kpi-sub{font-size:.72rem;color:var(--gray);margin-top:.15rem}
.kpi-card.green{border-top-color:var(--green)}
.kpi-card.yellow{border-top-color:#facc15}
.kpi-card.red{border-top-color:var(--red)}
.kpi-card.accent{border-top-color:var(--accent)}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.5rem}
.card h2{color:var(--bg);font-size:1.15rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
.card .subtitle{color:var(--gray);font-size:.82rem;margin-bottom:1rem}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.bar-label{width:200px;font-size:.8rem;font-weight:600;color:var(--dark);flex-shrink:0;text-align:right;padding-right:.5rem}
.bar-track{flex:1;height:24px;background:#f1f5f9;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:.5rem;color:var(--white);font-size:.72rem;font-weight:700;transition:width .8s ease}
.bar-count{font-size:.72rem;color:var(--gray);width:60px;flex-shrink:0;text-align:left;padding-left:.3rem}
.semaforo{width:14px;height:14px;border-radius:50%;display:inline-block}
.semaforo.green{background:var(--green)}
.semaforo.yellow{background:#facc15}
.semaforo.red{background:var(--red)}
.pill{display:inline-block;padding:.15rem .5rem;border-radius:10px;font-size:.7rem;font-weight:700}
.pill-green{background:#dcfce7;color:#166534}
.pill-yellow{background:#fef9c3;color:#854d0e}
.pill-red{background:#fee2e2;color:#991b1b}
.pill-gray{background:#f1f5f9;color:#64748b}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--bg);color:var(--white);padding:.6rem .5rem;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}
th:first-child{border-radius:6px 0 0 0}
th:last-child{border-radius:0 6px 0 0}
td{padding:.5rem;border-bottom:1px solid #e2e8f0}
tr:nth-child(even){background:#f8fafc}
tr:hover{background:#eff6ff}
.heatmap-cell{padding:.5rem;border-radius:6px;text-align:center;font-size:.75rem;font-weight:700;color:var(--white);cursor:default;transition:transform .15s}
.heatmap-cell:hover{transform:scale(1.05);z-index:5;position:relative}
.empty{text-align:center;padding:2rem;color:var(--gray)}
.empty .icon{font-size:2.5rem;margin-bottom:.5rem;opacity:.5}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--white);padding:.8rem 1.2rem;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;font-size:.85rem;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}
.tab-bar{display:flex;gap:.25rem;border-bottom:2px solid #e2e8f0;margin-bottom:1rem;overflow-x:auto}
.tab-bar button{background:transparent;border:none;padding:.6rem 1rem;font-size:.85rem;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
.tab-bar button:hover{color:var(--bg2)}
.tab-bar button.active{color:var(--bg2);border-bottom-color:var(--bg2)}
.app-footer{text-align:center;padding:1.5rem;color:var(--gray);font-size:.78rem;border-top:1px solid #e2e8f0;margin-top:2rem}
@media(max-width:768px){.bar-label{width:120px;font-size:.72rem}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>

<header class="app-header">

      <div>

</div>

<main class="app-container" id="main-content"></main>

</footer>

  {id:6,nombre:"Modelos de Atención",esfera:1,icon:"🏥",desc:"Reorientar modelos hacia APS: atención integral, integrada y centrada en las personas",preguntas:["¿Existe un modelo de atención definido que incorpore servicios integrales (promocional, preventivo, curativo, rehabilitación)?","¿Se utilizan equipos multiprofesionales (médico, enfermera, trabajador social, farmacéutico)?","¿Existen listados/enlaces de población asignada a cada equipo de atención primaria?","¿Se garantiza la derivación oportuna y contrarreferencia desde atención primaria a servicios agudos/especializados?","¿Se implementa gestión y coordinación de casos en la comunidad?"]},
  {id:7,nombre:"Gobernanza de la Salud",esfera:2,icon:"⚖️",desc:"Autonomía local, marcos de políticas, participación comunitaria en decisiones",preguntas:["¿Existe descentralización de la autonomía en la toma de decisiones a nivel local?","¿Hay marcos de políticas y acuerdos de planificación conjunta que apoyen la integración de servicios?","¿Se incluyen comunidades y partes interesadas en la identificación de problemas y soluciones?","¿Existe garantía de calidad, seguimiento regular y ciclos de retroalimentación?","¿Hay liderazgo que fomente una cultura de equidad y rendición de cuentas?"]},
  {id:8,nombre:"Personal Sanitario",esfera:1,icon:"👨‍⚕️",desc:"Planificación estratégica, educación, reclutamiento, retención y equipos multiprofesionales",preguntas:["¿Existe planificación estratégica de la fuerza laboral basada en análisis del mercado laboral de salud?","¿Se cuenta con educación pre-servicio y formación continua de alta calidad adaptada a APS?","¿Se implementan estrategias de reclutamiento y retención con condiciones de trabajo atractivas?","¿Se abordan las desigualdades de género, antigüedad y remuneración del personal?","¿Se implementa el cambio de tareas (task-shifting) y equipos multiprofesionales?"]},
  {id:9,nombre:"Financiamiento",esfera:3,icon:"💰",desc:"Recaudación, mancomunación, asignación y compra estratégica para APS",preguntas:["¿Existe voluntad política y compromiso de financiamiento público suficiente para APS?","¿Se utilizan fondos comunes (pooling) para financiar APS y reducir pagos de bolsillo?","¿Se han definido paquetes integrales de beneficios alineados con financiamiento público?","¿Se utilizan métodos de pago a proveedores que incentiven APS (capitación, pago por desempeño)?","¿Se gestiona adecuadamente las finanzas públicas para flujo oportuno de recursos?"]},
  {id:10,nombre:"Medicamentos",esfera:1,icon:"💊",desc:"Acceso equitativo, uso racional, cadena de suministro y prescripción de calidad",preguntas:["¿Se garantiza acceso asequible a medicamentos esenciales con financiamiento público?","¿Se utiliza prescripción sistemática de genéricos y biosimilares?","¿Existe gestión de existencias y prácticas de adquisición eficientes?","¿Se coordina entre farmacias comunitarias y prescriptores?","¿Se involucra a pacientes y comunidades en alfabetización en medicamentos y autocuidado?"]},
  {id:11,nombre:"Tecnologías Sanitarias",esfera:1,icon:"🔬",desc:"Tecnología apropiada para diagnóstico temprano, autocuidado y coordinación",preguntas:["¿Se utiliza tecnología para identificación temprana de factores de riesgo y diagnóstico?","¿Existen sistemas de apoyo clínico y derivación que permitan compartir información entre niveles?","¿Se promueve el autocuidado con tecnología (dispositivos de monitoreo)?","¿Se capacita al personal y pacientes en uso de tecnologías sanitarias?","¿Se garantizan servicios de apoyo, gestión y mantenimiento de equipos?"]},
  {id:12,nombre:"Infraestructura",esfera:1,icon:"🏗️",desc:"WASH, edificios, equipos no médicos, electricidad, internet y mantenimiento",preguntas:["¿Se cumplen requisitos básicos de WASH (agua, saneamiento, higiene) y gestión de residuos?","¿La infraestructura considera necesidades médicas y no médicas de personas y comunidades?","¿Se planifica el patrón de demanda futura e innovación tecnológica en el diseño?","¿Se garantizan conexiones fiables de electricidad e internet?","¿Se contemplan costos de ciclo de vida y mantenimiento, no solo costos iniciales?"]},
  {id:13,nombre:"Sistemas de Información",esfera:1,icon:"💻",desc:"Registros electrónicos, identificador único, datos de calidad, interoperabilidad",preguntas:["¿Existen registros electrónicos de salud y un identificador único del paciente?","¿Se garantizan datos de alta calidad, fiables y seguros que se analizan y comparten?","¿Existen sistemas de datos interoperables con definiciones estandarizadas?","¿Se cuenta con disponibilidad oportuna de datos y recursos para entrada/gestión eficaz?","¿Se tienen en cuenta las desigualdades en la adopción y uso de soluciones digitales?"]}
];

const ESFERAS=[
  {id:1,nombre:"Servicios de Salud Integrados",icon:"🏥",color:"#0B4F9E"},
  {id:2,nombre:"Participación Comunitaria",icon:"🤝",color:"#0A8A3F"},
  {id:3,nombre:"Acción Multisectorial",icon:"🌐",color:"#b8860b"}
];

const STORAGE_KEY='aps_cundi_exec_v1';
let DB={registros:[]};

function loadData(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){DB=JSON.parse(raw);}}catch(e){DB={registros:[]};}
  if(!DB.registros)DB.registros=[];
}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));}

function getScore(reg){if(!reg||!reg.respuestas)return 0;let s=0,c=0;for(let k in reg.respuestas){if(reg.respuestas[k]>0){s+=reg.respuestas[k];c++;}}return c>0?s/c:0;}
function getPalancaScore(reg,palancaId){if(!reg||!reg.respuestas)return 0;let s=0,c=0;PALANCAS.forEach(p=>{if(p.id===palancaId){p.preguntas.forEach((q,i)=>{const k=p.id+'_'+i;if(reg.respuestas[k]){s+=reg.respuestas[k];c++;}});}});return c>0?s/c:0;}
function pct(score){return Math.round((score/5)*100);}
function semaforo(p){if(p>=80)return'green';if(p>=40)return'yellow';return'red';}
function semaforoColor(p){const s=semaforo(p);return s==='green'?'#0A8A3F':s==='yellow'?'#facc15':'#C8102E';}

let filters={region:'',municipio:'',ese:'',periodo:'',estado:''};

function initFilters(){
  const selR=document.getElementById('f-region');
  HIERARCHY.forEach(r=>{const o=document.createElement('option');o.value=r.region;o.textContent=r.region;selR.appendChild(o);});
}

function onFilterChange(){
  const reg=document.getElementById('f-region').value;
  const selM=document.getElementById('f-municipio');
  const selE=document.getElementById('f-ese');
  if(reg&&reg!==filters.region){
    selM.innerHTML='<option value="">Todos los municipios</option>';
    const r=HIERARCHY.find(x=>x.region===reg);
    r.municipios.forEach(m=>{const o=document.createElement('option');o.value=m.nombre;o.textContent=m.nombre;selM.appendChild(o);});
    selM.disabled=false;
    selE.innerHTML='<option value="">Todas las ESE</option>';
    selE.disabled=true;
    document.getElementById('f-municipio').value='';
    filters.municipio='';filters.ese='';
  }else if(!reg){
    selM.innerHTML='<option value="">Todos los municipios</option>';
    selE.innerHTML='<option value="">Todas las ESE</option>';
    selM.disabled=true;selE.disabled=true;
    filters.municipio='';filters.ese='';
  }
  const mun=document.getElementById('f-municipio').value;
  if(mun&&mun!==filters.municipio){
    selE.innerHTML='<option value="">Todas las ESE</option>';
    const r=HIERARCHY.find(x=>x.region===reg);
    if(r){const m=r.municipios.find(x=>x.nombre===mun);if(m){m.eses.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;selE.appendChild(o);});selE.disabled=false;}}
    filters.ese='';document.getElementById('f-ese').value='';
  }else if(!mun){
    selE.innerHTML='<option value="">Todas las ESE</option>';
    selE.disabled=true;filters.ese='';
  }
  filters.region=reg;
  filters.municipio=document.getElementById('f-municipio').value;
  filters.ese=document.getElementById('f-ese').value;
  filters.periodo=document.getElementById('f-periodo').value;
  filters.estado=document.getElementById('f-estado').value;
  renderDashboard();
}

function getFilteredRegistros(){
  return DB.registros.filter(r=>{
    if(filters.region&&!r.region.includes(filters.region))return false;
    if(filters.municipio&&r.municipio!==filters.municipio)return false;
    if(filters.ese&&r.ese!==filters.ese)return false;
    if(filters.periodo&&r.periodo!==filters.periodo)return false;
    if(filters.estado&&r.estado!==filters.estado)return false;
    return true;
  });
}

function renderDashboard(){
  const regs=getFilteredRegistros();
  const main=document.getElementById('main-content');
  if(regs.length===0){
    main.innerHTML='<div class="card"><div class="empty"><div class="icon">📊</div><h2 style="color:var(--bg)">Sin datos consolidados</h2><p>No hay registros de autoevaluación que coincidan con los filtros seleccionados.</p><p style="margin-top:.5rem;font-size:.8rem">Use el botón <b>🎲 Datos Demo</b> para generar datos de ejemplo, o asegúrese de que los hospitales hayan completado evaluaciones en la plataforma APS.</p></div></div>';
    return;
  }
  const totalESE=new Set(regs.map(r=>r.ese)).size;
  const totalMunicipios=new Set(regs.map(r=>r.municipio)).size;
  const totalRegiones=new Set(regs.map(r=>r.region)).size;
  const completos=regs.filter(r=>r.estado==='Completo').length;
  const promScore=regs.reduce((s,r)=>s+getScore(r),0)/regs.length;
  const promPct=pct(promScore);
  const totalESETotal=HIERARCHY.reduce((s,r)=>s+r.municipios.reduce((sm,m)=>sm+m.eses.length,0),0);
  const coverage=Math.round((totalESE/totalESETotal)*100);
  const sem=semaforo(promPct);
  const semLabel=sem==='green'?'AVANZADO':sem==='yellow'?'EN DESARROLLO':'INICIAL';

  let html=`
  <div class="kpi-grid">
    <div class="kpi-card ${sem}"><div class="kpi-icon">🎯</div><div class="kpi-value">${promPct}%</div><div class="kpi-label">Nivel Global APS</div><div class="kpi-sub">Promedio ${promScore.toFixed(1)}/5 · ${semLabel}</div></div>
    <div class="kpi-card accent"><div class="kpi-icon">🏥</div><div class="kpi-value">${totalESE}</div><div class="kpi-label">ESE Evaluadas</div><div class="kpi-sub">Cobertura: ${coverage}% de ${totalESETotal}</div></div>
    <div class="kpi-card green"><div class="kpi-icon">✅</div><div class="kpi-value">${completos}</div><div class="kpi-label">Evaluaciones Completas</div><div class="kpi-sub">de ${regs.length} registros</div></div>
    <div class="kpi-card yellow"><div class="kpi-icon">📍</div><div class="kpi-value">${totalRegiones}</div><div class="kpi-label">Regiones Participando</div><div class="kpi-sub">${totalMunicipios} municipios</div></div>
  </div>

  <div class="card">
    <h2>⚙️ Desempeño por Palanca Operativa (OMS 2024)</h2>
    <p class="subtitle">Nivel de implementación de las 8 palancas operativas — consolidado de todas las ESE evaluadas</p>
    ${(() => {
      let bars='';
      PALANCAS.forEach(p=>{
        let sum=0,cnt=0;
        regs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});
        const avg=cnt>0?sum/cnt:0;const pc=pct(avg);
        bars+=`<div class="bar-row"><div class="bar-label">${p.icon} ${p.nombre}</div><div class="bar-track"><div class="bar-fill" style="width:${pc}%;background:${semaforoColor(pc)}">${pc}%</div></div><div class="bar-count">(${cnt} ESE)</div></div>`;
      });
      return bars;
    })()}
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>🌐 Desempeño por Esfera APS</h2>
      <p class="subtitle">3 componentes interconectados de la APS (OMS/UNICEF)</p>
      ${ESFERAS.map(e=>{
        let sum=0,cnt=0;
        regs.forEach(r=>{PALANCAS.filter(p=>p.esfera===e.id).forEach(p=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});});
        const avg=cnt>0?sum/cnt:0;const pc=pct(avg);
        return `<div class="bar-row"><div class="bar-label">${e.icon} ${e.nombre}</div><div class="bar-track"><div class="bar-fill" style="width:${pc}%;background:${e.color}">${pc}%</div></div></div>`;
      }).join('')}
    </div>
    <div class="card">
      <h2>🗺️ Desempeño por Región de Salud</h2>
      <p class="subtitle">Promedio consolidado por región — Cundinamarca</p>
      ${(() => {
        let bars='';
        HIERARCHY.forEach(h=>{
          let sum=0,cnt=0;
          regs.filter(r=>r.region===h.region).forEach(r=>{const s=getScore(r);if(s>0){sum+=s;cnt++;}});
          if(cnt>0){const avg=sum/cnt;const pc=pct(avg);
            bars+=`<div class="bar-row"><div class="bar-label">${h.region}</div><div class="bar-track"><div class="bar-fill" style="width:${pc}%;background:${semaforoColor(pc)}">${pc}%</div></div><div class="bar-count">(${cnt})</div></div>`;
          }
        });
        return bars||'<p style="color:var(--gray);font-size:.82rem">Sin datos por región</p>';
      })()}
    </div>
  </div>

  <div class="card">
    <h2>🏆 Ranking de Hospitales/ESE</h2>
    <p class="subtitle">Ordenado por nivel de implementación APS (mayor a menor)</p>
    ${(() => {
      let rows=regs.map(r=>({reg:r,score:getScore(r),pc:pct(getScore(r))}));
      rows.sort((a,b)=>b.score-a.score);
      let t=`<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Hospital / ESE</th><th>Región</th><th>Municipio</th><th>Nivel</th><th>Estado</th><th>Periodo</th></tr></thead><tbody>`;
      rows.forEach((row,i)=>{
        t+=`<tr><td><b>${i+1}</b></td><td style="font-size:.78rem">${row.reg.ese}</td><td>${row.reg.region}</td><td>${row.reg.municipio}</td><td><span class="semaforo ${semaforo(row.pc)}"></span> <b>${row.pc}%</b></td><td><span class="pill ${row.reg.estado==='Completo'?'pill-green':'pill-gray'}">${row.reg.estado}</span></td><td>${row.reg.periodo}</td></tr>`;
      });
      t+='</tbody></table></div>';
      return t;
    })()}
  </div>

  <div class="card">
    <h2>🔥 Heatmap: Región × Palanca Operativa</h2>
    <p class="subtitle">Matriz de semaforización — identifica brechas territoriales por palanca</p>
    ${(() => {
      let h='<div style="overflow-x:auto"><table style="font-size:.75rem"><thead><tr><th>Región</th>';
      PALANCAS.forEach(p=>{h+=`<th style="text-align:center;writing-mode:vertical-rl;font-size:.68rem">${p.icon} ${p.nombre}</th>`;});
      h+='<th style="text-align:center">Global</th></tr></thead><tbody>';
      HIERARCHY.forEach(hr=>{
        const regRegs=regs.filter(r=>r.region===hr.region);
        if(regRegs.length===0)return;
        h+=`<tr><td style="font-weight:600;font-size:.75rem">${hr.region}</td>`;
        PALANCAS.forEach(p=>{
          let sum=0,cnt=0;regRegs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});
          const pc=cnt>0?pct(sum/cnt):0;
          const bg=pc===0?'#f1f5f9':semaforoColor(pc);const fg=pc===0?'#94a3b8':'#fff';
          h+=`<td style="text-align:center;padding:.2rem"><div class="heatmap-cell" style="background:${bg};color:${fg};min-width:50px">${pc>0?pc+'%':'—'}</div></td>`;
        });
        let gs=0,gc=0;regRegs.forEach(r=>{const s=getScore(r);if(s>0){gs+=s;gc++;}});
        const gpc=pct(gc>0?gs/gc:0);
        h+=`<td style="text-align:center;padding:.2rem"><div class="heatmap-cell" style="background:${semaforoColor(gpc)};color:#fff;min-width:50px"><b>${gpc}%</b></div></td></tr>`;
      });
      h+='</tbody></table></div>';
      return h;
    })()}
  </div>

  <div class="card">
    <h2>📋 Detalle de Palancas Operativas</h2>
    <p class="subtitle">Desglose de preguntas por palanca con promedio consolidado</p>
    ${PALANCAS.map(p=>{
      let palSum=0,palCnt=0;regs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){palSum+=s;palCnt++;}});
      const palPc=pct(palCnt>0?palSum/palCnt:0);const esfera=ESFERAS.find(e=>e.id===p.esfera);
      let inner=`<div style="margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e2e8f0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
          <h3 style="color:var(--bg);font-size:1rem">${p.icon} ${p.nombre} <span style="font-size:.7rem;color:${esfera.color}">(${esfera.icon} ${esfera.nombre})</span></h3>
          <span class="pill ${semaforo(palPc)==='green'?'pill-green':semaforo(palPc)==='yellow'?'pill-yellow':'pill-red'}">${palPc}%</span>
        </div>
        <p style="font-size:.8rem;color:var(--gray);margin-bottom:.5rem">${p.desc}</p>`;
      p.preguntas.forEach((q,i)=>{
        let qSum=0,qCnt=0;regs.forEach(r=>{const v=r.respuestas[p.id+'_'+i];if(v>0){qSum+=v;qCnt++;}});
        const qPc=pct(qCnt>0?qSum/qCnt:0);
        inner+=`<div class="bar-row"><div class="bar-label" style="width:auto;font-size:.75rem;font-weight:400;flex:1;text-align:left;padding-right:1rem">${i+1}. ${q}</div><div class="bar-track" style="width:120px;flex-shrink:0"><div class="bar-fill" style="width:${qPc}%;background:${semaforoColor(qPc)}">${qPc>0?qPc+'%':'—'}</div></div></div>`;
      });
      inner+='</div>';return inner;
    }).join('')}
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>📊 Distribución por Nivel de Madurez</h2>
      <p class="subtitle">Clasificación automática según semaforización</p>
      ${(() => {
        const advanced=regs.filter(r=>pct(getScore(r))>=80).length;
        const developing=regs.filter(r=>{const pc=pct(getScore(r));return pc>=40&&pc<80;}).length;
        const initial=regs.filter(r=>pct(getScore(r))<40).length;
        const total=regs.length;
        return `
          <div class="bar-row"><div class="bar-label">🟢 Avanzado (≥80%)</div><div class="bar-track"><div class="bar-fill" style="width:${total>0?(advanced/total*100):0}%;background:var(--green)">${advanced}</div></div><div class="bar-count">${total>0?Math.round(advanced/total*100):0}%</div></div>
          <div class="bar-row"><div class="bar-label">🟡 En Desarrollo (40-79%)</div><div class="bar-track"><div class="bar-fill" style="width:${total>0?(developing/total*100):0}%;background:#facc15">${developing}</div></div><div class="bar-count">${total>0?Math.round(developing/total*100):0}%</div></div>
          <div class="bar-row"><div class="bar-label">🔴 Inicial (<40%)</div><div class="bar-track"><div class="bar-fill" style="width:${total>0?(initial/total*100):0}%;background:var(--red)">${initial}</div></div><div class="bar-count">${total>0?Math.round(initial/total*100):0}%</div></div>
        `;
      })()}
    </div>
    <div class="card">
      <h2>📈 Estado de Evaluaciones</h2>
      <p class="subtitle">Progreso de completitud del proceso de autoevaluación</p>
      ${(() => {
        const complete=regs.filter(r=>r.estado==='Completo').length;
        const draft=regs.filter(r=>r.estado==='Borrador').length;
        const total=regs.length;
        return `
          <div class="bar-row"><div class="bar-label">✅ Completas</div><div class="bar-track"><div class="bar-fill" style="width:${total>0?(complete/total*100):0}%;background:var(--green)">${complete}</div></div><div class="bar-count">${total>0?Math.round(complete/total*100):0}%</div></div>
          <div class="bar-row"><div class="bar-label">📝 Borrador</div><div class="bar-track"><div class="bar-fill" style="width:${total>0?(draft/total*100):0}%;background:var(--gray)">${draft}</div></div><div class="bar-count">${total>0?Math.round(draft/total*100):0}%</div></div>
          <div style="margin-top:1rem;padding:.8rem;background:#f0f4f8;border-radius:8px;font-size:.82rem">
            <b>Total registros:</b> ${total}<br><b>ESE únicas:</b> ${new Set(regs.map(r=>r.ese)).size}<br><b>Periodos:</b> ${[...new Set(regs.map(r=>r.periodo))].sort().join(', ')}
          </div>`;
      })()}
    </div>
  </div>

  <div class="card">
    <h2>📄 Resumen Ejecutivo</h2>
    <p class="subtitle">Análisis automático del estado de implementación APS en Cundinamarca</p>
    <div style="padding:1rem;background:#f0f4f8;border-radius:8px;font-size:.85rem;line-height:1.8">
      ${generateExecutiveSummary(regs,promPct,totalESE,totalESETotal,completos)}
    </div>
  </div>`;
  main.innerHTML=html;
}

function generateExecutiveSummary(regs,promPct,totalESE,totalESETotal,completos){
  const sem=semaforo(promPct);
  const nivel=sem==='green'?'AVANZADO':sem==='yellow'?'EN DESARROLLO':'INICIAL';
  let weakest=null,strongest=null;
  PALANCAS.forEach(p=>{
    let sum=0,cnt=0;regs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});
    const pc=pct(cnt>0?sum/cnt:0);
    if(!weakest||pc<weakest.pc)weakest={p,pc};
    if(!strongest||pc>strongest.pc)strongest={p,pc};
  });
  let weakestReg=null;
  HIERARCHY.forEach(h=>{
    let sum=0,cnt=0;regs.filter(r=>r.region===h.region).forEach(r=>{const s=getScore(r);if(s>0){sum+=s;cnt++;}});
    if(cnt>0){const pc=pct(sum/cnt);if(!weakestReg||pc<weakestReg.pc)weakestReg={region:h.region,pc};}
  });
  let s=`<p><b>Estado general:</b> El nivel global de implementación APS en las ESE evaluadas de Cundinamarca es <b>${promPct}%</b> (${nivel}), basado en ${regs.length} registro(s) de autoevaluación correspondientes a ${totalESE} ESE (cobertura del ${Math.round(totalESE/totalESETotal*100)}% del total departamental).</p>`;
  if(strongest)s+=`<p><b>Fortaleza principal:</b> La palanca <b>${strongest.p.icon} ${strongest.p.nombre}</b> presenta el mayor nivel de implementación con <b>${strongest.pc}%</b>, indicando avance en ${strongest.p.desc.toLowerCase()}.</p>`;
  if(weakest)s+=`<p><b>Brecha crítica:</b> La palanca <b>${weakest.p.icon} ${weakest.p.nombre}</b> es la más débil con <b>${weakest.pc}%</b>, requiriendo atención prioritaria para fortalecer ${weakest.p.desc.toLowerCase()}.</p>`;
  if(weakestReg)s+=`<p><b>Región prioritaria:</b> La región <b>${weakestReg.region}</b> presenta el menor desempeño global (${weakestReg.pc}%), siendo foco de intervención inmediata.</p>`;
  s+=`<p><b>Completitud:</b> ${completos} de ${regs.length} evaluaciones están completas (${regs.length>0?Math.round(completos/regs.length*100):0}%), lo que ${completos/regs.length>=0.7?'indica un buen nivel de respuesta':'sugiere la necesidad de fortalecer el proceso de autoevaluación'}.</p>`;
  s+=`<p><b>Recomendaciones:</b> 1) Priorizar intervenciones en ${weakest?weakest.p.nombre:'las palancas débiles'}; 2) Apoyar a las ESE en nivel inicial para alcanzar umbral mínimo (40%); 3) Replicar buenas prácticas de ESE con nivel avanzado; 4) Completar evaluaciones en borrador para consolidar el panorama departamental.</p>`;
  return s;
}

function toast(msg,isError){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isError?' error':' success');
  setTimeout(()=>t.className='toast',3000);
}

function loadDemoData(){
  const periodos=['2026-Q1','2026-Q2'];
  const responsables=['Coordinador APS','Director Médico','Referente APS','Jefe de Salud Pública'];
  const cargos=['Coordinador APS','Director Médico','Referente APS'];
  DB.registros=[];
  HIERARCHY.forEach(h=>{
    h.municipios.forEach(m=>{
      m.eses.forEach(ese=>{
        if(Math.random()>0.3){
          const respuestas={};
          PALANCAS.forEach(p=>{
            p.preguntas.forEach((q,i)=>{
              const base=2+Math.random()*3;
              const variance=Math.random()>0.8?-1:0;
              respuestas[p.id+'_'+i]=Math.max(1,Math.min(5,Math.round(base+variance)));
            });
          });
          const score=getScore({respuestas});
          const estado=score>=3?'Completo':'Borrador';
          DB.registros.push({
            id:'D'+Math.random().toString(36).substr(2,9),
            fecha:new Date(Date.now()-Math.random()*90*86400000).toISOString().split('T')[0],
            periodo:periodos[Math.floor(Math.random()*periodos.length)],
            region:h.region,municipio:m.nombre,ese:ese,
            responsable:responsables[Math.floor(Math.random()*responsables.length)],
            cargo:cargos[Math.floor(Math.random()*cargos.length)],
            estado,respuestas
          });
        }
      });
    });
  });
  saveData();
  toast('✅ '+DB.registros.length+' registros demo cargados',false);
  renderDashboard();
}

function clearAllData(){
  if(!confirm('¿Eliminar todos los datos consolidados? Esta acción no se puede deshacer.'))return;
  DB={registros:[]};saveData();toast('Datos eliminados',false);renderDashboard();
}

function exportCSV(){
  const regs=getFilteredRegistros();
  if(regs.length===0){toast('⚠️ Sin datos para exportar',true);return;}
  let csv='Fecha,Periodo,Region,Municipio,ESE,Responsable,Cargo,Estado,Score,Pct\n';
  regs.forEach(r=>{const sc=getScore(r);csv+=`${r.fecha},${r.periodo},${r.region},${r.municipio},"${r.ese}",${r.responsable||''},${r.cargo||''},${r.estado},${sc.toFixed(2)},${pct(sc)}\n`;});
  csv+='\n\nDetalle por Palanca\nESE,Palanca,Score,Pct\n';
  regs.forEach(r=>{PALANCAS.forEach(p=>{const sc=getPalancaScore(r,p.id);if(sc>0)csv+=`"${r.ese}",${p.nombre},${sc.toFixed(2)},${pct(sc)}\n`;});});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='dashboard_APS_consolidado.csv';a.click();URL.revokeObjectURL(url);
  toast('✅ CSV exportado',false);
}

function gatherExportData(regs){
  const palancaScores=PALANCAS.map(p=>{
    let sum=0,cnt=0;regs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});
    return{id:p.id,nombre:p.nombre,icon:p.icon,desc:p.desc,esfera:p.esfera,score:cnt>0?sum/cnt:0,pct:pct(cnt>0?sum/cnt:0),count:cnt};
  });
  const regionScores=HIERARCHY.map(h=>{
    let sum=0,cnt=0;regs.filter(r=>r.region===h.region).forEach(r=>{const s=getScore(r);if(s>0){sum+=s;cnt++;}});
    return{region:h.region,score:cnt>0?sum/cnt:0,pct:pct(cnt>0?sum/cnt:0),count:cnt};
  }).filter(r=>r.count>0);
  const esferaScores=ESFERAS.map(e=>{
    let sum=0,cnt=0;regs.forEach(r=>{PALANCAS.filter(p=>p.esfera===e.id).forEach(p=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});});
    return{nombre:e.nombre,score:cnt>0?sum/cnt:0,pct:pct(cnt>0?sum/cnt:0)};
  });
  const hospitalRanking=regs.map(r=>({ese:r.ese,region:r.region,municipio:r.municipio,score:getScore(r),pct:pct(getScore(r)),estado:r.estado,periodo:r.periodo})).sort((a,b)=>b.score-a.score);
  const promScore=regs.reduce((s,r)=>s+getScore(r),0)/regs.length;
  const totalESE=new Set(regs.map(r=>r.ese)).size;
  const totalESETotal=HIERARCHY.reduce((s,r)=>s+r.municipios.reduce((sm,m)=>sm+m.eses.length,0),0);
  const completos=regs.filter(r=>r.estado==='Completo').length;
  const heatmap=HIERARCHY.map(h=>{
    const regRegs=regs.filter(r=>r.region===h.region);
    if(regRegs.length===0)return null;
    const pals=PALANCAS.map(p=>{
      let sum=0,cnt=0;regRegs.forEach(r=>{const s=getPalancaScore(r,p.id);if(s>0){sum+=s;cnt++;}});
      return{palanca:p.nombre,pct:pct(cnt>0?sum/cnt:0)};
    });
    let gs=0,gc=0;regRegs.forEach(r=>{const s=getScore(r);if(s>0){gs+=s;gc++;}});
    return{region:h.region,palancas:pals,globalPct:pct(gc>0?gs/gc:0)};
  }).filter(Boolean);
  return{fecha:new Date().toISOString().split('T')[0],totalRegistros:regs.length,totalESE,totalESETotal,coverage:Math.round(totalESE/totalESETotal*100),completos,promScore:promScore.toFixed(2),promPct:pct(promScore),semaforo:semaforo(pct(promScore)),palancas:palancaScores,regiones:regionScores,esferas:esferaScores,ranking:hospitalRanking,heatmap,registros:regs.map(r=>({fecha:r.fecha,periodo:r.periodo,region:r.region,municipio:r.municipio,ese:r.ese,responsable:r.responsable,cargo:r.cargo,estado:r.estado,score:getScore(r).toFixed(2),pct:pct(getScore(r))}))};
}
